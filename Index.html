<input type="checkbox" id="sites" checked> Déchetteries<br>
<input type="checkbox" id="distances" checked> Distances
</div><script>

// ===== CALCUL DISTANCE =====
function distance(lat1, lon1, lat2, lon2) {
var R = 6371;
var dLat = (lat2-lat1) * Math.PI/180;
var dLon = (lon2-lon1) * Math.PI/180;
var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2) * Math.sin(dLon/2);
var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
return R * c;
}

var layerCommunes = L.layerGroup().addTo(map);
var layerSites = L.layerGroup().addTo(map);
var layerDistances = L.layerGroup().addTo(map);

// Déchetteries
sites.forEach(function(s){
L.marker([s[1],s[2]]).addTo(layerSites)
.bindPopup("<b>"+s[0]+"</b><br>📞 "+s[3]+"<br><a target='_blank' href='https://www.google.com/maps/dir/?api=1&destination="+s[1]+","+s[2]+"'>🚗 Y aller</a>");
});

// Communes + distance
communes.forEach(function(c){

var nearest = sites[0];
var minDist = 999;

sites.forEach(function(s){
var d = distance(c[1],c[2],s[1],s[2]);
if(d < minDist){
minDist = d;
nearest = s;
}
});

L.circleMarker([c[1],c[2]],{color:"blue"})
.addTo(layerCommunes)
.bindPopup("<b>"+c[0]+"</b><br>"+minDist.toFixed(1)+" km vers "+nearest[0]);

L.marker([c[1],c[2]], {
icon: L.divIcon({
html: "<div style='background:white;padding:2px 6px;border-radius:6px;'>"+minDist.toFixed(1)+" km</div>"
})
}).addTo(layerDistances);

});

// boutons
document.getElementById("communes").onchange = function(){
this.checked ? map.addLayer(layerCommunes) : map.removeLayer(layerCommunes);
}
document.getElementById("sites").onchange = function(){
this.checked ? map.addLayer(layerSites) : map.removeLayer(layerSites);
}
document.getElementById("distances").onchange = function(){
this.checked ? map.addLayer(layerDistances) : map.removeLayer(layerDistances);
}
